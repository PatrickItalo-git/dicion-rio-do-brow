<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dicionário do Brow 📖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface2: #1e1e2e;
      --border: #2a2a3d;
      --accent: #7c6aff;
      --accent2: #ff6aab;
      --accent-glow: rgba(124, 106, 255, 0.25);
      --text: #e8e8f0;
      --text-muted: #7a7a9a;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image: url('spiderbrow.jpg');
      background-repeat: repeat;
      background-size: 260px;
      background-blend-mode: luminosity;
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      padding: 2.5rem 1rem;
      border-radius: 20px;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('spiderbrow.jpg');
      background-size: cover;
      background-position: center top;
      opacity: 0.18;
      z-index: 0;
    }

    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,20,0.3) 0%, rgba(13,13,20,0.85) 100%);
      z-index: 1;
    }

    header > * {
      position: relative;
      z-index: 2;
    }

    /* Decoração flutuante */
    .spiderbrow-deco {
      position: fixed;
      bottom: -20px;
      right: -20px;
      width: 180px;
      height: 180px;
      background-image: url('spiderbrow.jpg');
      background-size: cover;
      background-position: center top;
      border-radius: 50%;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      filter: grayscale(40%);
    }

    .header-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* ── CONTAINER ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── SEARCH ── */
    .search-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.35rem 0.9rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .stat-chip span {
      color: var(--accent);
      font-weight: 700;
    }

    /* ── WORD LIST ── */
    #wordList {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .word-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .word-card:hover {
      transform: translateX(5px);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .word-avatar {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      flex-shrink: 0;
      object-fit: cover;
      background: transparent;
      transition: transform 0.2s, filter 0.2s;
    }

    .word-card:hover .word-avatar {
      transform: scale(1.08) rotate(-2deg);
      filter: drop-shadow(0 0 8px var(--accent));
    }

    .word-body {
      flex: 1;
      min-width: 0;
    }

    .word-term {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .word-definition {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-muted);
    }

    .empty-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
    }

    .empty h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
  </style>
</head>

<body>

  <!-- Decoração flutuante SpiderBrow -->
  <div class="spiderbrow-deco"></div>

  <header>
    <div class="header-badge">📖 Vocabulário exclusivo do T.I</div>
    <h1>Dicionário do Brow</h1>
    <p class="subtitle">As palavras que só ele entende — traduzidas pra você.</p>
  </header>

  <div class="container">

    <!-- Busca -->
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar uma palavra..." />
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-chip">Total: <span id="totalCount">0</span> palavras</div>
      <div class="stat-chip" id="resultChip" style="display:none">
        Encontradas: <span id="resultCount">0</span>
      </div>
    </div>

    <!-- Lista -->
    <div id="wordList"></div>

  </div>

  <script>
    /* ── Dados ── */
    const words = [
      { word: 'Neves', def: 'Ao invés' },
      { word: 'Cenoura', def: 'Reposição' },
      { word: 'Ração', def: 'Estava' },
      { word: 'Bronzeado', def: 'Browzada' },
      { word: 'Aquino', def: '🤷 Sem tradução ainda' },
      { word: 'Consegui ver pra nós', def: 'Consegue ver pra nós' },
      { word: 'Sobi', def: 'Subir' },
      { word: 'Curita', def: 'Curitiba' },
      { word: 'Ghrome', def: 'Chrome' },
      { word: 'Mornaram', def: 'Eu acho que amontaram' },
      { word: 'devi', def: 'deve' },
      { word: 'suduesencias', def: 'terras do sudoeste' },
    ].sort((a, b) => a.word.localeCompare(b.word, 'pt-BR'));

    /* ── Elementos ── */
    const wordList = document.getElementById('wordList');
    const searchInput = document.getElementById('searchInput');
    const totalCount = document.getElementById('totalCount');
    const resultChip = document.getElementById('resultChip');
    const resultCount = document.getElementById('resultCount');

    /* ── Render ── */
    function render() {
      const q = searchInput.value.trim().toLowerCase();

      const list = q
        ? words.filter(w =>
          w.word.toLowerCase().includes(q) ||
          w.def.toLowerCase().includes(q))
        : [...words];

      totalCount.textContent = words.length;

      if (q) {
        resultChip.style.display = '';
        resultCount.textContent = list.length;
      } else {
        resultChip.style.display = 'none';
      }

      if (list.length === 0) {
        wordList.innerHTML = `
          <div class="empty">
            <span class="empty-emoji">🔎</span>
            <h3>Nenhuma palavra encontrada</h3>
            <p>Tente outro termo.</p>
          </div>`;
        return;
      }

      wordList.innerHTML = list.map(w => `
        <div class="word-card">
          <img class="word-avatar" src="brow.png" alt="brow" />
          <div class="word-body">
            <div class="word-term">${esc(w.word)}</div>
            <div class="word-definition">↳ ${esc(w.def)}</div>
          </div>
        </div>`).join('');
    }

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    searchInput.addEventListener('input', render);

    render();
  </script>

</body>

</html>
